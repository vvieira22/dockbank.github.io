<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

const TEAL      = '#00BFB3';
const TEAL_DARK = '#009D90';
const TEAL_BG   = '#EAF8F7';
const GRAY_BAR  = '#D2D6DB';
const STORAGE    = 'dock-timeline-v2';
const MY_CLIENT  = String(Date.now()); // session ID — prevents Firestore echo loops

const formatTs = ts => {
  const d = Date.now() - ts;
  if (d < 60000)     return 'agora mesmo';
  if (d < 3600000)   return `há ${Math.floor(d/60000)} min`;
  if (d < 86400000)  return `há ${Math.floor(d/3600000)}h`;
  if (d < 172800000) return 'ontem';
  return new Date(ts).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
};
const WW        = 100;  /* px per week column */
const LW        = 210;  /* px for label column in gantt */

let _c = 0;
const uid = () => `${Date.now()}${++_c}`;

/* ─── default data ─────────────────────────────────────────────── */
const makeDefaultTab = (name = 'Nova timeline') => ({
  id: uid(), name, startDate: getThisMonday(), sections: []
});
const makeDefault = () => [makeDefaultTab('Cronograma DockBank')];

/* ─── EditText ─────────────────────────────────────────────────── */
function EditText({ value, onChange, style, placeholder = 'editar…', oneLine = true }) {
  const [on, setOn] = useState(false);
  const ref = useRef();
  useEffect(() => { if (on && ref.current) { ref.current.focus(); ref.current.select?.(); } }, [on]);
  const save = e => { const v = e.target.value.trim(); onChange(v || value); setOn(false); };
  const kd = e => { if (e.key === 'Enter' && oneLine) ref.current.blur(); if (e.key === 'Escape') setOn(false); };
  if (on) return (
    <input ref={ref} defaultValue={value} onBlur={save} onKeyDown={kd}
      style={{ ...style, border: 'none', borderBottom: `1.5px solid ${TEAL}`, outline: 'none',
        background: 'transparent', padding: '1px 0', width: '100%', minWidth: 60 }} />
  );
  return (
    <span onClick={() => setOn(true)} title="Clique para editar" style={{ ...style, cursor: 'text', display: 'block' }}>
      {value || <span style={{ color: '#C0C4CA', fontStyle: 'italic', fontWeight: 400 }}>{placeholder}</span>}
    </span>
  );
}

/* ─── EditDays ─────────────────────────────────────────────────── */
function EditDays({ value, onChange, style }) {
  const [on, setOn] = useState(false);
  const ref = useRef();
  useEffect(() => { if (on && ref.current) { ref.current.focus(); ref.current.select(); } }, [on]);
  if (on) return (
    <input ref={ref} type="number" step="0.5" defaultValue={value ?? ''} placeholder="0"
      onBlur={e => { const v = e.target.value === '' ? null : parseFloat(e.target.value); onChange(isNaN(v) ? null : v); setOn(false); }}
      onKeyDown={e => { if (e.key === 'Enter') ref.current.blur(); }}
      style={{ width: 40, textAlign: 'right', border: 'none', borderBottom: `1.5px solid ${TEAL}`,
        outline: 'none', background: 'transparent', ...style }} />
  );
  return (
    <span onClick={() => setOn(true)} title="Clique para editar" style={{ ...style, cursor: 'pointer' }}>
      {value === null || value === undefined ? '—' : value}
    </span>
  );
}

/* ─── STATUS ───────────────────────────────────────────────────── */
const STATUS = {
  done:          { next: 'pending',     label: '✓ Pronto',    color: '#8A9099', bg: '#F0F1F3' },
  'in-progress': { next: 'done',        label: '● Andamento', color: TEAL_DARK, bg: TEAL_BG   },
  pending:       { next: 'in-progress', label: '○ Pendente',  color: '#9BA0A8', bg: '#F5F5F4' },
};

/* ─── ItemRow ──────────────────────────────────────────────────── */
function ItemRow({ item, maxDays, onUpdate, onDelete }) {
  const [hov, setHov] = useState(false);
  const isDone = item.status === 'done';
  const isActive = item.status === 'in-progress';
  const s = STATUS[item.status];
  const barPct = isDone ? 100 : (maxDays > 0 ? Math.min(100, ((item.demoDays || 0) / maxDays) * 100) : 0);
  const upd = patch => onUpdate({ ...item, ...patch });
  return (
    <div onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ display: 'grid', gridTemplateColumns: '230px 1fr 108px 80px 72px', alignItems: 'center',
        minHeight: 52, borderBottom: '1px solid #ECEEF0',
        background: isActive ? TEAL_BG : hov ? '#FAFAF9' : '#fff',
        borderLeft: `3px solid ${isActive ? TEAL : 'transparent'}`, transition: 'background 0.1s' }}>
      <div style={{ padding: '8px 8px 8px 14px' }}>
        <EditText value={item.title} placeholder="Nome da feature" oneLine onChange={v => upd({ title: v })}
          style={{ fontSize: 14, fontWeight: isDone ? 400 : 500, color: isDone ? '#9BA0A8' : '#1c1c1e', lineHeight: 1.3 }} />
        <EditText value={item.subtitle} placeholder="+ subtítulo" oneLine onChange={v => upd({ subtitle: v })}
          style={{ fontSize: 11, color: '#9BA0A8', marginTop: 2, lineHeight: 1.3 }} />
      </div>
      <div style={{ padding: '0 20px' }}>
        <div style={{ height: 5, borderRadius: 3, background: '#E8EAED', overflow: 'hidden' }}>
          <div style={{ width: `${barPct}%`, height: '100%', background: isDone ? GRAY_BAR : TEAL,
            borderRadius: 3, transition: 'width 0.3s ease' }} />
        </div>
      </div>
      <div style={{ textAlign: 'center', padding: '0 6px' }}>
        <button onClick={() => upd({ status: s.next })} title="Clique para mudar status"
          style={{ fontSize: 10, fontWeight: 700, letterSpacing: 0.3, color: s.color, background: s.bg,
            borderRadius: 4, padding: '3px 8px', whiteSpace: 'nowrap' }}>
          {s.label}
        </button>
      </div>
      <div style={{ textAlign: 'right', paddingRight: 8 }}>
        {isDone ? <span style={{ fontSize: 12, color: '#D0D4D9' }}>—</span> : (
          <span style={{ display: 'inline-flex', alignItems: 'baseline', gap: 1, fontSize: 15,
            fontWeight: 700, color: TEAL, fontVariantNumeric: 'tabular-nums' }}>
            ~<EditDays value={item.demoDays} onChange={v => upd({ demoDays: v })}
              style={{ fontSize: 15, fontWeight: 700, color: TEAL, width: 28, textAlign: 'right' }} />d
          </span>
        )}
      </div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 4, paddingRight: 12 }}>
        {item.apiDays === null ? (
          <span onClick={() => upd({ apiDays: 1 })} title="Clique para adicionar"
            style={{ fontSize: 12, color: '#D0D4D9', cursor: 'pointer' }}>—</span>
        ) : (
          <span style={{ display: 'inline-flex', alignItems: 'baseline', gap: 0, fontSize: 13,
            color: item.apiDays < 0 ? '#D07070' : '#6B7280', fontVariantNumeric: 'tabular-nums' }}>
            {item.apiDays >= 0 ? '+' : ''}
            <EditDays value={item.apiDays} onChange={v => upd({ apiDays: v })}
              style={{ fontSize: 13, color: 'inherit', width: 26, textAlign: 'right' }} />d
          </span>
        )}
        <button onClick={onDelete} title="Remover"
          style={{ fontSize: 16, color: hov ? '#C8CDD3' : 'transparent', lineHeight: 1,
            padding: '0 2px', transition: 'color 0.1s' }}>×</button>
      </div>
    </div>
  );
}

/* ─── SectionBlock ─────────────────────────────────────────────── */
function SectionBlock({ section, maxDays, onUpdate, onDelete, onAddItem,
  onDragStart, onDragOver, onDrop, onDragEnd, isDragging, isDropTarget }) {
  const [hov, setHov] = useState(false);
  const canDrag = useRef(false);
  const upd = patch => onUpdate({ ...section, ...patch });
  const updateItem = (id, u) => upd({ items: section.items.map(i => i.id === id ? u : i) });
  const deleteItem = id => upd({ items: section.items.filter(i => i.id !== id) });
  return (
    <div
      draggable={true}
      onDragStart={e => { if (!canDrag.current) { e.preventDefault(); return; } onDragStart(); }}
      onDragOver={e => { e.preventDefault(); onDragOver(); }}
      onDrop={onDrop}
      onDragEnd={onDragEnd}
      style={{ opacity: isDragging ? 0.35 : 1, transition: 'opacity 0.15s',
        borderTop: isDropTarget ? `2px solid ${TEAL}` : '2px solid transparent' }}>
      <div onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
        style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '14px 14px 7px', borderBottom: '1px solid #ECEEF0' }}>
        {/* drag handle */}
        <span
          onMouseDown={() => { canDrag.current = true; }}
          onMouseUp={() => { canDrag.current = false; }}
          title="Arrastar para reordenar"
          style={{ fontSize: 14, color: '#C8CDD3', cursor: 'grab', userSelect: 'none',
            lineHeight: 1, flexShrink: 0, opacity: hov ? 1 : 0, transition: 'opacity 0.15s' }}>⠿</span>
        <EditText value={section.name} placeholder="NOME DA SEÇÃO" oneLine
          onChange={v => upd({ name: v.toUpperCase() })}
          style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1.3, color: '#8A9099' }} />
        <div style={{ display: 'flex', gap: 4, opacity: hov ? 1 : 0, transition: 'opacity 0.15s' }}>
          <button onClick={onAddItem}
            style={{ fontSize: 10, color: TEAL, border: `1px solid ${TEAL}`, borderRadius: 3, padding: '1px 8px' }}>
            + item
          </button>
          <button onClick={() => { if (window.confirm('Remover esta seção?')) onDelete(); }}
            style={{ fontSize: 10, color: '#B0B5BC', border: '1px solid #DDDFE2', borderRadius: 3, padding: '1px 8px' }}>
            × seção
          </button>
        </div>
      </div>
      {section.items.map(item => (
        <ItemRow key={item.id} item={item} maxDays={maxDays}
          onUpdate={u => updateItem(item.id, u)} onDelete={() => deleteItem(item.id)} />
      ))}
      {section.items.length === 0 && (
        <div style={{ padding: '12px 14px', fontSize: 12, color: '#C0C4CA' }}>
          Seção vazia — <span onClick={onAddItem} style={{ color: TEAL, cursor: 'pointer', textDecoration: 'underline' }}>adicionar item</span>
        </div>
      )}
    </div>
  );
}

/* ─── GanttBar ─────────────────────────────────────────────────── */
function GanttBar({ item, resolvedStart, onUpdateWeekStart }) {
  const [dragDx, setDragDx] = useState(0);
  const [dragging, setDragging] = useState(false);
  const startRef = useRef({ x: 0, week: 0 });

  const isDone   = item.status === 'done';
  const isActive = item.status === 'in-progress';
  /* minimum 36px so even 0.5d fits the label comfortably */
  const dur  = (item.demoDays || 1) / 5;
  const wPx  = Math.max(36, dur * WW - 4);
  /* for narrow bars use smaller centered font, for wide bars larger left-aligned */
  const narrow = wPx < 52;

  const onMouseDown = e => {
    e.preventDefault();
    e.stopPropagation();
    startRef.current = { x: e.clientX, week: resolvedStart };
    setDragging(true);
    const onMove = ev => setDragDx(ev.clientX - startRef.current.x);
    const onUp = ev => {
      const dw = (ev.clientX - startRef.current.x) / WW;
      const snapped = Math.max(0, Math.round((startRef.current.week + dw) * 2) / 2);
      onUpdateWeekStart(snapped);
      setDragDx(0);
      setDragging(false);
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  };

  const left = Math.max(0, resolvedStart * WW + dragDx);
  const bg   = isDone ? '#C8CDD3' : isActive ? TEAL : '#3DCCC6';
  const textColor = isDone ? '#9BA0A8' : '#fff';

  return (
    <div onMouseDown={onMouseDown}
      title={`${item.title} · ${item.demoDays}d — arrastar para reposicionar`}
      style={{
        position: 'absolute', left, top: '50%', transform: 'translateY(-50%)',
        width: wPx, height: 26, borderRadius: 5, background: bg,
        cursor: dragging ? 'grabbing' : 'grab',
        display: 'flex', alignItems: 'center',
        justifyContent: narrow ? 'center' : 'flex-start',
        paddingLeft: narrow ? 0 : 8,
        userSelect: 'none', zIndex: dragging ? 20 : 2,
        boxShadow: dragging ? `0 6px 18px ${TEAL}44` : 'none',
        transition: dragging ? 'none' : 'box-shadow 0.15s',
      }}>
      <span style={{ fontSize: narrow ? 9 : 10, fontWeight: 700, color: textColor,
        whiteSpace: 'nowrap', letterSpacing: 0.2 }}>
        {item.demoDays}d
      </span>
    </div>
  );
}

/* ─── helpers de data ─────────────────────────────────────────── */
const getThisMonday = () => {
  const d = new Date(); const day = d.getDay();
  d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return d.toISOString().split('T')[0];
};
const weekDateLabel = (sd, idx) => {
  const d = new Date(sd + 'T00:00:00'); d.setDate(d.getDate() + idx * 7);
  const f = new Date(d); f.setDate(f.getDate() + 4);
  const mo = d.toLocaleString('pt-BR', { month: 'short' }).replace('.','');
  const mf = f.toLocaleString('pt-BR', { month: 'short' }).replace('.','');
  return d.getMonth() === f.getMonth() ? `${d.getDate()}–${f.getDate()} ${mo}` : `${d.getDate()} ${mo}–${f.getDate()} ${mf}`;
};

/* ─── GanttView ────────────────────────────────────────────────── */
function GanttView({ data, onUpdateItemById, onUpdateStartDate, snapshotAndSetWeekStart }) {
  const startDate = data.startDate || getThisMonday();
  /* compute resolved positions — null weekStart = auto-sequence */
  const posMap = useMemo(() => {
    const m = {};
    let cursor = 0;
    data.sections.forEach(s => s.items.forEach(i => {
      const rs  = i.weekStart != null ? i.weekStart : cursor;
      const dur = Math.max(0.2, (i.demoDays || 1) / 5);
      cursor = rs + dur;
      m[i.id] = rs;
    }));
    return m;
  }, [data]);

  const totalWeeks = useMemo(() => {
    let maxEnd = 6;
    data.sections.forEach(s => s.items.forEach(i => {
      const rs  = posMap[i.id] ?? 0;
      const dur = Math.max(0.2, (i.demoDays || 1) / 5);
      maxEnd = Math.max(maxEnd, rs + dur);
    }));
    return Math.ceil(maxEnd) + 3;
  }, [data, posMap]);

  const gridW = totalWeeks * WW;
  const stripe = i => i % 2 === 0 ? 'transparent' : 'rgba(0,0,0,0.018)';

  /* month groupings */
  const monthGroups = useMemo(() => {
    const groups = []; let cur = null;
    for (let i = 0; i < totalWeeks; i++) {
      const d = new Date(startDate + 'T00:00:00'); d.setDate(d.getDate() + i * 7);
      const key = `${d.getFullYear()}-${d.getMonth()}`;
      const raw = d.toLocaleString('pt-BR', { month: 'long' });
      const label = raw.charAt(0).toUpperCase() + raw.slice(1) + ' ' + d.getFullYear();
      if (!cur || cur.key !== key) { cur = { key, label, startIdx: i, endIdx: i }; groups.push(cur); }
      else cur.endIdx = i;
    }
    return groups;
  }, [startDate, totalWeeks]);

  return (
    <div className="gantt-scroll">
      <div style={{ minWidth: LW + gridW }}>

        {/* month header */}
        <div style={{ display: 'flex', height: 26, background: '#F2F4F6', borderBottom: '1px solid #DDE0E5' }}>
          <div style={{ width: LW, flexShrink: 0, display: 'flex', alignItems: 'center',
            paddingLeft: 14, gap: 6, borderRight: '1px solid #DDE0E5' }}>
            <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: 0.8, color: '#C0C4CA' }}>INÍCIO</span>
            <input type="date" value={startDate} onChange={e => onUpdateStartDate(e.target.value)}
              style={{ fontSize: 10, color: '#6B7280', border: 'none', background: 'transparent',
                outline: 'none', cursor: 'pointer', fontFamily: 'inherit', padding: 0 }} />
          </div>
          <div style={{ position: 'relative', flex: 1 }}>
            {monthGroups.map(g => (
              <div key={g.key} style={{ position: 'absolute',
                left: g.startIdx * WW, width: (g.endIdx - g.startIdx + 1) * WW,
                top: 0, bottom: 0, display: 'flex', alignItems: 'center', paddingLeft: 10,
                borderLeft: g.startIdx > 0 ? '2px solid #C8CDD3' : 'none',
                fontSize: 10, fontWeight: 700, color: '#6B7280', letterSpacing: 0.5,
                overflow: 'hidden', whiteSpace: 'nowrap' }}>
                {g.label}
              </div>
            ))}
          </div>
        </div>

        {/* week header */}
        <div style={{ display: 'flex', height: 38, background: '#FAFAF9', borderBottom: '2px solid #ECEEF0' }}>
          <div style={{ width: LW, flexShrink: 0, display: 'flex', alignItems: 'center', paddingLeft: 14 }}>
            <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: 1.2, color: '#B8BDC5' }}>FEATURE</span>
          </div>
          {Array.from({ length: totalWeeks }, (_, i) => (
            <div key={i} style={{ width: WW, flexShrink: 0, display: 'flex', flexDirection: 'column',
              alignItems: 'center', justifyContent: 'center', gap: 1, borderLeft: '1px solid #ECEEF0' }}>
              <span style={{ fontSize: 10, fontWeight: 600, color: '#9BA0A8', letterSpacing: 0.3 }}>Sem {i + 1}</span>
              <span style={{ fontSize: 8, color: '#C0C4CA' }}>{weekDateLabel(startDate, i)}</span>
            </div>
          ))}
        </div>

        {/* sections */}
        {data.sections.map(section => (
          <div key={section.id}>

            {/* section label */}
            <div style={{ display: 'flex', height: 28, background: '#F7F8F9',
              borderTop: '1px solid #ECEEF0', borderBottom: '1px solid #ECEEF0' }}>
              <div style={{ width: LW, flexShrink: 0, paddingLeft: 14, display: 'flex', alignItems: 'center' }}>
                <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: 1.2, color: '#8A9099' }}>{section.name}</span>
              </div>
              <div style={{ flex: 1, position: 'relative', overflow: 'hidden' }}>
                {Array.from({ length: totalWeeks }, (_, i) => (
                  <div key={i} style={{ position: 'absolute', left: i * WW, top: 0, bottom: 0,
                    width: WW, background: stripe(i), borderLeft: '1px solid #ECEEF0' }} />
                ))}
              </div>
            </div>

            {section.items.length === 0 && (
              <div style={{ display: 'flex', height: 40, borderBottom: '1px solid #F2F3F5' }}>
                <div style={{ width: LW, flexShrink: 0, paddingLeft: 14, display: 'flex', alignItems: 'center' }}>
                  <span style={{ fontSize: 11, color: '#D0D4D9' }}>Seção vazia</span>
                </div>
              </div>
            )}

            {section.items.map(item => {
              const rs     = posMap[item.id] ?? 0;
              const isDone = item.status === 'done';
              return (
                <div key={item.id} style={{ display: 'flex', minHeight: 46, alignItems: 'stretch',
                  borderBottom: '1px solid #F2F3F5', background: '#fff' }}>
                  {/* label */}
                  <div style={{ width: LW, flexShrink: 0, paddingLeft: 14, paddingRight: 10,
                    paddingTop: 8, paddingBottom: 8,
                    display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
                    <span style={{ fontSize: 13, fontWeight: isDone ? 400 : 500,
                      color: isDone ? '#B8BDC5' : '#1c1c1e',
                      lineHeight: 1.35, textWrap: 'pretty', wordBreak: 'break-word' }}>
                      {item.title}
                    </span>
                    {item.subtitle && (
                      <span style={{ fontSize: 10, color: '#C0C4CA', marginTop: 2,
                        lineHeight: 1.3, textWrap: 'pretty', wordBreak: 'break-word' }}>
                        {item.subtitle}
                      </span>
                    )}
                  </div>
                  {/* grid + bar */}
                  <div style={{ flex: 1, position: 'relative' }}>
                    {Array.from({ length: totalWeeks }, (_, i) => (
                      <div key={i} style={{ position: 'absolute', left: i * WW, top: 0, bottom: 0,
                        width: WW, background: i % 2 === 0 ? '#fff' : '#FAFAF9',
                        borderLeft: '1px solid #F0F1F3' }} />
                    ))}
                    <GanttBar
                      item={item}
                      resolvedStart={rs}
                      onUpdateWeekStart={w => snapshotAndSetWeekStart(item.id, w)}
                    />
                  </div>
                </div>
              );
            })}
          </div>
        ))}

        {/* hint bar */}
        <div style={{ padding: '10px 14px', fontSize: 11, color: '#C8CDD3',
          background: '#FAFAF9', borderTop: '1px solid #ECEEF0', display: 'flex', gap: 20 }}>
          <span>⟵ arraste as barras para reposicionar</span>
          <span>snap: ½ semana (2,5 dias)</span>
          <span>comprimento = dias de demo</span>
        </div>
      </div>
    </div>
  );
}

/* ─── App ──────────────────────────────────────────────────────── */
function App() {
  const [tab,           setTab]           = useState('list');
  const [user,          setUser]          = useState(null);
  const [authLoading,   setAuthLoading]   = useState(true);
  const [signInLoading, setSignInLoading] = useState(false);
  const [authError,     setAuthError]     = useState('');
  const [tabs,          setTabs]          = useState(() => makeDefault());
  const [activeTabId,   setActiveTabId]   = useState(null);
  const [actLog,        setActLog]        = useState([]);
  const isRemoteRef     = useRef(false);
  const writeTimerRef   = useRef(null);
  const initializedRef  = useRef(false); // impede write antes do 1º snapshot carregar

  /* derived: aba ativa */
  const resolvedTabId = activeTabId ?? tabs[0]?.id;
  const activeData    = tabs.find(t => t.id === resolvedTabId) ?? tabs[0] ?? makeDefaultTab();

  /* auth — verifica allowlist após login com Google */
  useEffect(() => {
    return fbAuth.onAuthStateChanged(async u => {
      if (u) {
        if (!isAllowed(u.email)) {
          await fbAuth.signOut();
          setAuthError(`Acesso não autorizado para ${u.email}. Use sua conta @dock.tech.`);
          setUser(null);
        } else {
          setAuthError('');
          setUser(u);
        }
      } else {
        setUser(null);
      }
      setAuthLoading(false);
    });
  }, []);

  /* Firestore data sync */
  useEffect(() => {
    if (!user) { initializedRef.current = false; return; }
    const doc = fbDb.collection('timeline').doc('main');
    const unsub = doc.onSnapshot(snap => {
      if (!snap.exists) {
        const initial = makeDefault();
        setTabs(initial);
        setActiveTabId(initial[0].id);
        doc.set({ tabs: initial, _c: MY_CLIENT });
        initializedRef.current = true;
      } else {
        const remote = snap.data();
        initializedRef.current = true; // sempre marca após 1º snapshot
        if (remote._c !== MY_CLIENT) {
          isRemoteRef.current = true;
          const { _c, ...clean } = remote;
          /* migração: formato antigo tinha sections/title na raiz */
          if (clean.sections && !clean.tabs) {
            const migrated = [{ id: uid(), name: clean.title || 'Cronograma DockBank', startDate: clean.startDate, sections: clean.sections }];
            setTabs(migrated);
            setActiveTabId(migrated[0].id);
          } else {
            const loaded = clean.tabs || makeDefault();
            setTabs(loaded);
            setActiveTabId(prev => (prev && loaded.find(t => t.id === prev)) ? prev : loaded[0]?.id ?? null);
          }
        }
      }
    });
    const unsubLog = doc.collection('log').orderBy('ts', 'desc').limit(300)
      .onSnapshot(snap => setActLog(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
    return () => { unsub(); unsubLog(); };
  }, [user]);

  /* write to Firestore debounced 800ms */
  useEffect(() => {
    if (!user) return;
    if (!initializedRef.current) return; // aguarda o 1º snapshot antes de escrever
    clearTimeout(writeTimerRef.current);  // sempre cancela timer pendente primeiro
    if (isRemoteRef.current) { isRemoteRef.current = false; return; }
    writeTimerRef.current = setTimeout(() => {
      fbDb.collection('timeline').doc('main').set({ tabs, _c: MY_CLIENT });
    }, 800);
  }, [tabs, user]);

  const logIt = useCallback((action) => {
    if (!user) return;
    fbDb.collection('timeline').doc('main').collection('log').add({
      ts: Date.now(), user: user.displayName || user.email || 'Anônimo', userId: user.uid, action
    });
  }, [user]);

  const signIn  = async () => { setSignInLoading(true); try { await fbAuth.signInWithPopup(googleProvider); } catch(e) { console.error(e); } setSignInLoading(false); };
  const signOut = () => fbAuth.signOut();

  /* ── gerenciamento de abas ── */
  const updateActiveTab = useCallback(updater =>
    setTabs(prev => prev.map(t => t.id === resolvedTabId ? updater(t) : t))
  , [resolvedTabId]);

  const addTab = () => {
    const t = makeDefaultTab('Nova timeline');
    setTabs(prev => [...prev, t]);
    setActiveTabId(t.id);
    setTab('list');
    logIt('Nova aba criada');
  };
  const deleteTab = tabId => {
    const name = tabs.find(t => t.id === tabId)?.name || '';
    if (!window.confirm(`Remover a aba "${name}"?`)) return;
    setTabs(prev => {
      const rest = prev.filter(t => t.id !== tabId);
      if (activeTabId === tabId) setActiveTabId(rest[0]?.id ?? null);
      return rest;
    });
    logIt(`Aba "${name}" removida`);
  };
  const renameTab = (tabId, name) =>
    setTabs(prev => prev.map(t => t.id === tabId ? { ...t, name } : t));

  /* ── helpers de dados (operam na aba ativa) ── */
  const maxDays = useMemo(() => {
    let m = 1;
    (activeData?.sections || []).forEach(s => s.items.forEach(i => { if ((i.demoDays || 0) > m) m = i.demoDays; }));
    return m;
  }, [activeData]);

  const totals = useMemo(() => {
    let demo = 0, api = 0;
    (activeData?.sections || []).forEach(s => s.items.forEach(i => {
      if (i.status !== 'done') { demo += i.demoDays || 0; api += i.apiDays || 0; }
    }));
    const r = x => Math.round(x * 2) / 2;
    const w = x => Math.round(x / 5 * 2) / 2;
    return { demo: r(demo), api: r(api), total: r(demo + api), demoW: w(demo), totalW: w(demo + api) };
  }, [activeData]);

  const [dragSectionId, setDragSectionId] = useState(null);
  const [dropSectionId, setDropSectionId] = useState(null);

  const moveSectionTo = (fromId, toId) => {
    updateActiveTab(t => {
      const secs = [...t.sections];
      const fi = secs.findIndex(s => s.id === fromId);
      const ti = secs.findIndex(s => s.id === toId);
      if (fi === -1 || ti === -1 || fi === ti) return t;
      const fromName = secs[fi].name;
      const [moved] = secs.splice(fi, 1);
      secs.splice(ti, 0, moved);
      logIt(`Seção "${fromName}" reordenada`);
      return { ...t, sections: secs };
    });
  };

  const updateSection = (id, u) => {
    updateActiveTab(t => {
      const old = t.sections.find(s => s.id === id);
      if (old) {
        if (old.name !== u.name) logIt(`Seção renomeada: "${old.name}" → "${u.name}"`);
        old.items.forEach(oi => {
          const ni = u.items.find(i => i.id === oi.id);
          if (!ni) { logIt(`Item removido: "${oi.title}"`); return; }
          if (oi.status !== ni.status) logIt(`"${oi.title}": ${STATUS[oi.status].label} → ${STATUS[ni.status].label}`);
          if (oi.title !== ni.title)   logIt(`Renomeado: "${oi.title}" → "${ni.title}"`);
          if (oi.demoDays !== ni.demoDays) logIt(`Dias: "${ni.title}" ${oi.demoDays}d → ${ni.demoDays}d`);
        });
        u.items.forEach(ni => { if (!old.items.find(oi => oi.id === ni.id)) logIt(`Item adicionado: "${ni.title}"`); });
      }
      return { ...t, sections: t.sections.map(s => s.id === id ? u : s) };
    });
  };
  const deleteSection  = id  => updateActiveTab(t => { const s = t.sections.find(x => x.id === id); if(s) logIt(`Seção removida: "${s.name}"`); return { ...t, sections: t.sections.filter(s => s.id !== id) }; });
  const addSection     = ()  => { logIt('Nova seção criada'); updateActiveTab(t => ({ ...t, sections: [...t.sections, { id: uid(), name: 'NOVA SEÇÃO', items: [] }] })); };
  const addItem        = secId => updateActiveTab(t => ({
    ...t, sections: t.sections.map(s => s.id !== secId ? s : {
      ...s, items: [...s.items, { id: uid(), title: 'Nova feature', subtitle: '', status: 'pending', demoDays: 1, apiDays: 0.5 }]
    })
  }));
  const updateItemById = useCallback((id, patch) =>
    setTabs(prev => prev.map(t => t.id !== resolvedTabId ? t : {
      ...t, sections: t.sections.map(s => ({ ...s, items: s.items.map(i => i.id === id ? { ...i, ...patch } : i) }))
    }))
  , [resolvedTabId]);

  const snapshotAndSetWeekStart = useCallback((itemId, newWeek) => {
    setTabs(prev => prev.map(t => {
      if (t.id !== resolvedTabId) return t;
      const pos = {}; let cur = 0;
      t.sections.forEach(s => s.items.forEach(i => {
        const rs = i.weekStart != null ? i.weekStart : cur;
        const du = Math.max(0.2, (i.demoDays || 1) / 5);
        cur = rs + du; pos[i.id] = rs;
      }));
      const name = t.sections.flatMap(s => s.items).find(i => i.id === itemId)?.title || '';
      logIt(`Barra "${name}" movida para Sem ${Math.floor(newWeek) + 1}`);
      return {
        ...t,
        sections: t.sections.map(s => ({
          ...s,
          items: s.items.map(i => ({
            ...i,
            weekStart: i.id === itemId ? newWeek : (i.weekStart ?? pos[i.id] ?? 0)
          }))
        }))
      };
    }));
  }, [resolvedTabId, logIt]);

  const resetPositions = () => updateActiveTab(t => ({
    ...t, sections: t.sections.map(s => ({ ...s, items: s.items.map(i => ({ ...i, weekStart: null })) }))
  }));

  if (authLoading) return (
    <div style={{ minHeight: '100vh', background: '#EFEDE8', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <span style={{ fontSize: 14, color: '#9BA0A8' }}>Carregando…</span>
    </div>
  );
  if (!user) return <LoginScreen onSignIn={signIn} loading={signInLoading} error={authError} />;

  const COLS = '230px 1fr 108px 80px 72px';

  const LEGEND = [
    { c: GRAY_BAR,   l: 'Concluído' },
    { c: '#3DCCC6',  l: 'Pendente'  },
    { c: TEAL,       l: 'Andamento' },
  ];

  return (
    <div style={{ minHeight: '100vh', background: '#EFEDE8', padding: '40px 24px 80px' }}>
      <div style={{ maxWidth: 1080, margin: '0 auto' }}>
        <div style={{ background: '#fff', borderRadius: 14, boxShadow: '0 2px 24px rgba(0,0,0,0.07)', overflow: 'hidden' }}>

          {/* ── header ── */}
          <div style={{ padding: '16px 28px', borderBottom: '1px solid #ECEEF0' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 16, flexWrap: 'wrap' }}>

              {/* ── workspace tabs ── */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 3, flexWrap: 'wrap', minWidth: 0, flex: 1 }}>
                {tabs.map(t => {
                  const isActive = t.id === resolvedTabId;
                  return (
                    <div key={t.id} onClick={() => setActiveTabId(t.id)}
                      style={{ display: 'flex', alignItems: 'center', gap: 5,
                        padding: '6px 10px 6px 12px', borderRadius: 8, cursor: 'pointer',
                        background: isActive ? '#F2F3F5' : 'transparent',
                        border: `1px solid ${isActive ? '#E4E6EA' : 'transparent'}`,
                        transition: 'all 0.12s', maxWidth: 220 }}>
                      {isActive ? (
                        <EditText value={t.name} oneLine onChange={v => renameTab(t.id, v)}
                          style={{ fontSize: 14, fontWeight: 700, color: '#1c1c1e', letterSpacing: -0.3 }} />
                      ) : (
                        <span style={{ fontSize: 13, fontWeight: 500, color: '#9BA0A8',
                          whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', maxWidth: 170 }}>
                          {t.name}
                        </span>
                      )}
                      {tabs.length > 1 && (
                        <button onClick={e => { e.stopPropagation(); deleteTab(t.id); }}
                          style={{ fontSize: 14, lineHeight: 1, padding: '0 2px', flexShrink: 0,
                            color: isActive ? '#C0C4CA' : 'transparent', transition: 'color 0.1s' }}>×</button>
                      )}
                    </div>
                  );
                })}
                <button onClick={addTab}
                  style={{ width: 28, height: 28, borderRadius: 7, border: `1.5px dashed ${TEAL}`,
                    color: TEAL, fontSize: 18, display: 'flex', alignItems: 'center', justifyContent: 'center',
                    flexShrink: 0, lineHeight: 1 }}>+</button>
              </div>

              <div style={{ display: 'flex', alignItems: 'center', gap: 16, flexShrink: 0 }}>
                {/* legend */}
                <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
                  {LEGEND.map(({ c, l }) => (
                    <div key={l} style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                      <div style={{ width: 10, height: 4, borderRadius: 2, background: c }} />
                      <span style={{ fontSize: 11, color: '#9BA0A8' }}>{l}</span>
                    </div>
                  ))}
                </div>
                {/* view toggle */}
                <div style={{ display: 'flex', background: '#F2F3F5', borderRadius: 8, padding: 3, gap: 2 }}>
                  {[['list', 'Lista'], ['gantt', 'Gantt'], ['history', 'Histórico']].map(([t, l]) => (
                    <button key={t} onClick={() => setTab(t)}
                      style={{ fontSize: 12, fontWeight: 600, padding: '5px 18px', borderRadius: 6,
                        background: tab === t ? '#fff' : 'transparent',
                        color: tab === t ? '#1c1c1e' : '#9BA0A8',
                        boxShadow: tab === t ? '0 1px 4px rgba(0,0,0,0.1)' : 'none',
                        transition: 'all 0.15s' }}>
                      {l}
                    </button>
                  ))}
                </div>
              </div>
            </div>
            <div style={{ marginTop: 10, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <p style={{ fontSize: 11, color: '#C0C4CA' }}>
                {tab === 'list'    ? 'Clique em qualquer texto para editar · Clique no status para alternar · Hover para excluir'
                : tab === 'gantt'  ? 'Arraste as barras para reposicionar · Snap ½ semana · Edite nomes e dias na aba Lista'
                :                   'Registro de alterações — todas as mudanças são salvas automaticamente'}
              </p>
              {/* user info */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
                {user.photoURL
                  ? <img src={user.photoURL} alt="" style={{ width: 26, height: 26, borderRadius: 13 }} />
                  : <div style={{ width: 26, height: 26, borderRadius: 13, background: TEAL, flexShrink: 0,
                      display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700, color: '#fff' }}>
                      {(user.displayName || user.email || '?')[0].toUpperCase()}
                    </div>
                }
                <span style={{ fontSize: 11, color: '#6B7280', maxWidth: 130, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                  {user.displayName || user.email}
                </span>
                <button onClick={signOut}
                  style={{ fontSize: 10, color: '#9BA0A8', border: '1px solid #DDDFE2', borderRadius: 4, padding: '3px 8px' }}>
                  Sair
                </button>
              </div>
            </div>
          </div>

          {/* ── lista ── */}
          {tab === 'list' && (
            <>
              <div style={{ display: 'grid', gridTemplateColumns: COLS, padding: '7px 0',
                background: '#FAFAF9', borderBottom: '1px solid #ECEEF0' }}>
                {[{ l: 'FEATURE', a: 'left', pl: 17 }, { l: 'ESFORÇO VISUAL', a: 'center' },
                  { l: 'STATUS', a: 'center' }, { l: 'DEMO', a: 'right', pr: 8 }, { l: '+ API', a: 'right', pr: 12 }]
                  .map(({ l, a, pl = 0, pr = 0 }) => (
                    <div key={l} style={{ fontSize: 9, fontWeight: 700, letterSpacing: 1.2, color: '#B8BDC5',
                      textAlign: a, paddingLeft: pl, paddingRight: pr }}>{l}</div>
                  ))}
              </div>
              {(activeData?.sections || []).map(s => (
                <SectionBlock key={s.id} section={s} maxDays={maxDays}
                  onUpdate={u => updateSection(s.id, u)}
                  onDelete={() => deleteSection(s.id)}
                  onAddItem={() => addItem(s.id)}
                  onDragStart={() => setDragSectionId(s.id)}
                  onDragOver={() => { if (dragSectionId && dragSectionId !== s.id) setDropSectionId(s.id); }}
                  onDrop={() => { if (dragSectionId) moveSectionTo(dragSectionId, s.id); setDragSectionId(null); setDropSectionId(null); }}
                  onDragEnd={() => { setDragSectionId(null); setDropSectionId(null); }}
                  isDragging={dragSectionId === s.id}
                  isDropTarget={dropSectionId === s.id && dragSectionId !== s.id}
                />
              ))}
              {/* total row */}
              <div style={{ display: 'grid', gridTemplateColumns: COLS, alignItems: 'center', height: 52,
                borderTop: '2px solid #1c1c1e', background: '#FAFAF9' }}>
                <div style={{ paddingLeft: 17, fontSize: 12, fontWeight: 700, letterSpacing: 0.5, color: '#5A5F68' }}>TOTAL PENDENTES</div>
                <div style={{ padding: '0 20px' }}>
                  <div style={{ height: 5, borderRadius: 3, background: '#E8EAED', overflow: 'hidden' }}>
                    <div style={{ width: `${Math.min(100, (totals.demo / maxDays) * 100)}%`, height: '100%', background: TEAL, borderRadius: 3 }} />
                  </div>
                </div>
                <div />
                <div style={{ textAlign: 'right', paddingRight: 8, fontSize: 17, fontWeight: 800, color: TEAL, fontVariantNumeric: 'tabular-nums' }}>~{totals.demo}d</div>
                <div style={{ textAlign: 'right', paddingRight: 12, fontSize: 14, fontWeight: 600, color: '#6B7280', fontVariantNumeric: 'tabular-nums' }}>+{totals.api}d</div>
              </div>
            </>
          )}

          {/* ── histórico ── */}
          {tab === 'history' && (
            <div style={{ padding: '20px 24px 8px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                <span style={{ fontSize: 12, color: '#9BA0A8' }}>{actLog.length} alterações registradas</span>
                <button onClick={() => {
                  const batch = fbDb.batch();
                  actLog.forEach(e => batch.delete(fbDb.collection('timeline').doc('main').collection('log').doc(e.id)));
                  batch.commit().catch(console.error);
                }} style={{ fontSize: 11, color: '#C0C4CA', padding: '2px 8px' }}>Limpar</button>
              </div>
              {actLog.length === 0 && (
                <p style={{ fontSize: 13, color: '#C0C4CA', padding: '20px 0' }}>Nenhuma alteração ainda — edite algo na aba Lista ou Gantt.</p>
              )}
              {actLog.map(e => (
                <div key={e.id} style={{ display: 'flex', gap: 10, alignItems: 'flex-start',
                  padding: '9px 0', borderBottom: '1px solid #F2F3F5' }}>
                  <div style={{ width: 28, height: 28, borderRadius: 14, background: TEAL, flexShrink: 0,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontSize: 11, fontWeight: 800, color: '#fff', letterSpacing: -0.3 }}>
                    {(e.user || '?')[0].toUpperCase()}
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <span style={{ fontSize: 12, fontWeight: 600, color: '#1c1c1e' }}>{e.user}</span>
                    <span style={{ fontSize: 12, color: '#6B7280' }}> · {e.action}</span>
                    <div style={{ fontSize: 10, color: '#C0C4CA', marginTop: 2 }}>{formatTs(e.ts)}</div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* ── gantt ── */}
          {tab === 'gantt' && <GanttView data={activeData} onUpdateItemById={updateItemById}
            onUpdateStartDate={d => updateActiveTab(t => ({ ...t, startDate: d }))}
            snapshotAndSetWeekStart={snapshotAndSetWeekStart} />}

          {/* ── summary cards (ambas as abas) ── */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', borderTop: '1px solid #ECEEF0' }}>
            {[
              { l: 'DEMO MOCKADO',   v: `~${totals.demo}d`,  s: `~${totals.demoW} semanas`  },
              { l: '+ API REAL',     v: `~${totals.api}d`,   s: 'quando APIs prontas'        },
              { l: 'TOTAL MVP PROD', v: `~${totals.total}d`, s: `~${totals.totalW} semanas`  },
            ].map(({ l, v, s }, i) => (
              <div key={l} style={{ padding: '24px 0', textAlign: 'center', borderRight: i < 2 ? '1px solid #ECEEF0' : 'none' }}>
                <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: 1.3, color: '#B8BDC5', marginBottom: 8 }}>{l}</div>
                <div style={{ fontSize: 30, fontWeight: 800, color: '#1c1c1e', letterSpacing: -1, fontVariantNumeric: 'tabular-nums' }}>{v}</div>
                <div style={{ fontSize: 11, color: '#B8BDC5', marginTop: 5 }}>{s}</div>
              </div>
            ))}
          </div>

          {/* ── footer ── */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            padding: '18px 20px', borderTop: '1px solid #ECEEF0', background: '#FAFAF9' }}>
            {tab === 'list' ? (
              <button onClick={addSection}
                style={{ fontSize: 12, color: TEAL, border: `1.5px dashed ${TEAL}`, borderRadius: 7, padding: '7px 20px', letterSpacing: 0.3 }}>
                + Adicionar seção
              </button>
            ) : (
              <button onClick={resetPositions}
                style={{ fontSize: 12, color: '#8A9099', border: '1.5px solid #DDDFE2', borderRadius: 7, padding: '7px 16px' }}>
                ↺ Resetar posições
              </button>
            )}
            <button onClick={() => { if (window.confirm('Resetar esta aba para o estado inicial?')) { updateActiveTab(() => makeDefaultTab(activeData?.name || 'Feature Timeline')); } }}
              style={{ fontSize: 11, color: '#C0C4CA', padding: '4px 8px' }}>
              Resetar dados
            </button>
          </div>

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
